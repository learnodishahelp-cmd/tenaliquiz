<!DOCTYPE html>

<head>

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .quiz-container { width: 100%; max-width: 500px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 20px; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .progress-container { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; }
        .progress-bar { height: 100%; background: var(--secondary); width: 0%; border-radius: 5px; transition: 0.3s; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: #333; }
        .options-grid { display: grid; gap: 10px; }
        .option-btn { padding: 15px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .option-btn:hover:not([disabled]) { border-color: var(--secondary); background: #f0f8ff; }
        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }
        #next-btn, #start-btn, #retry-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--primary); color: white; font-size: 1.1rem; cursor: pointer; margin-top: 20px; display: none; }
        #start-btn { display: block; background: var(--secondary); }
        .result-screen { text-align: center; display: none; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 5px solid var(--secondary); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; margin: 20px auto; color: var(--secondary); }
    </style>
</head>

        <button id="start-btn" onclick="startQuiz(0)">Start Quiz (Set 1)</button>

    <div id="quiz-screen" style="display:none">
        <div class="stats">

            <span id="q-count">1/25</span>
            <span id="live-score">Score: 0</span>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="question-text" id="question-text"></div>
        <div class="options-grid" id="options-grid"></div>
        <button id="next-btn" onclick="handleNext()">Next Question</button>
    </div>

    <div id="result-screen" class="result-screen">
        <h2 id="result-header">Set Completed!</h2>
        <div class="score-circle" id="final-score">0/25</div>
        <p id="result-msg"></p>
        <button id="retry-btn" onclick="loadNextSetInCycle()" style="display:block; background: var(--success);">Try Next Set (Cyclical)</button>
    </div>
</div>

let currentSetIdx = 0;
let currentQIdx = 0;
let currentScore = 0;

function startQuiz(setIndex) {
    currentSetIdx = setIndex;
    currentQIdx = 0;
    currentScore = 0;
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    const question = allSets[currentSetIdx][currentQIdx];
    document.getElementById('set-title').innerText = `Set ${currentSetIdx + 1}`;
    document.getElementById('q-count').innerText = `${currentQIdx + 1}/25`;
    document.getElementById('live-score').innerText = `Score: ${currentScore}`;
    document.getElementById('question-text').innerText = question.q;
    document.getElementById('next-btn').style.display = 'none';
    
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    
    question.a.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => selectOption(i, btn);
        grid.appendChild(btn);
    });

    const progress = ((currentQIdx) / 25) * 100;
    document.getElementById('progress-bar').style.width = progress + '%';
}

function selectOption(idx, btn) {
    const correct = allSets[currentSetIdx][currentQIdx].c;
    const allBtns = document.querySelectorAll('.option-btn');
    
    allBtns.forEach(b => b.disabled = true);
    
    if(idx === correct) {
        btn.classList.add('correct');
        currentScore++;
    } else {
        btn.classList.add('wrong');
        allBtns[correct].classList.add('correct');
    }
    document.getElementById('next-btn').style.display = 'block';
}

function handleNext() {
    currentQIdx++;
    if(currentQIdx < 25) {
        renderQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = `${currentScore}/25`;
    
    // Logic to show which set is next in the button text
    const nextSetNumber = ((currentSetIdx + 1) % 5) + 1;
    document.getElementById('retry-btn').innerText = `Try Set ${nextSetNumber} (Cyclical)`;
}

function loadNextSetInCycle() {
    // Cyclical logic: increment and wrap around using modulo 5
    currentSetIdx = (currentSetIdx + 1) % 5;
    startQuiz(currentSetIdx);
}
